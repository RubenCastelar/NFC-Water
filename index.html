<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Agua NFC" />
    <meta
      name="description"
      content="Registro de agua por NFC. Cada toque suma 600 ml y muestra tus métricas del día, la semana, el mes y el año."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css?v=5" />
    <title>Agua NFC</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">Agua NFC</p>
          <h1 id="todayLiters">0.0 L</h1>
          <p class="subtitle">Hoy</p>
          <p id="todayDetail" class="today-detail">0 de 4.0 litros</p>
          <p id="syncStatus" class="sync-status">Conectando con Supabase...</p>
          <div class="hero-actions">
            <button id="quickSubtractButton" class="ghost-button" type="button" aria-label="Restar 600 mililitros">
              -600 ml
            </button>
            <button id="quickAddButton" class="primary-button" type="button" aria-label="Añadir 600 mililitros">
              +600 ml
            </button>
          </div>
        </div>

        <div class="bottle-card" aria-label="Botella de 4 litros">
          <div class="bottle">
            <div id="bottleFill" class="bottle-fill"></div>
            <div class="bottle-neck"></div>
            <div class="bottle-markers">
              <span>4L</span>
              <span>3L</span>
              <span>2L</span>
              <span>1L</span>
              <span>0L</span>
            </div>
          </div>
          <p id="bottleCaption" class="bottle-caption">0% del objetivo de hoy</p>
        </div>
      </section>

      <section class="stats-strip" aria-label="Resumen">
        <article class="stat-chip">
          <span class="stat-label">Semana</span>
          <strong id="weekLiters">0.0 L</strong>
        </article>
        <article class="stat-chip">
          <span class="stat-label">Mes</span>
          <strong id="monthLiters">0.0 L</strong>
        </article>
        <article class="stat-chip">
          <span class="stat-label">Año</span>
          <strong id="yearLiters">0.0 L</strong>
        </article>
        <article class="stat-chip">
          <span class="stat-label">Total</span>
          <strong id="allTimeLiters">0.0 L</strong>
        </article>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Histórico</h2>
            <p id="chartCaption" class="panel-caption">Semana actual</p>
          </div>
          <div class="period-tabs" role="tablist" aria-label="Periodo del gráfico">
            <button class="period-tab active" type="button" data-period="week">Semana</button>
            <button class="period-tab" type="button" data-period="month">Mes</button>
            <button class="period-tab" type="button" data-period="year">Año</button>
          </div>
        </div>
        <div id="historyChart" class="history-chart" aria-label="Gráfico histórico"></div>
      </section>

      <section class="panel panel-soft">
        <div class="panel-heading">
          <div>
            <h2>Últimos registros</h2>
            <p class="panel-caption">Tus últimos 8 toques o registros manuales</p>
          </div>
        </div>
        <ul id="entriesList" class="entries-list" aria-live="polite"></ul>
      </section>

      <section class="panel panel-soft">
        <div class="panel-heading">
          <h2>NFC</h2>
        </div>
        <div class="url-box">
          <label for="nfcUrl">URL para grabar en el NFC</label>
          <div class="url-row">
            <input id="nfcUrl" type="text" readonly value="" />
            <button id="copyUrlButton" class="ghost-button" type="button">Copiar</button>
          </div>
        </div>
      </section>

      <section class="panel panel-soft">
        <div class="panel-heading">
          <h2>Datos</h2>
        </div>
        <div class="danger-actions">
          <button id="exportButton" class="ghost-button" type="button">Exportar JSON</button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js?v=6" defer></script>
  </body>
</html>
